<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Trash & Treasure</title>
  <style>
    :root{
      --bg1:#0b3b2a;
      --bg2:#0c5a3b;
      --panel:#0f2f22cc;
      --panelSolid:#0f2f22;
      --cardBg:#ffffff;
      --cardBorder:#1a1a1a55;
      --text:#eafff4;
      --muted:#cfe7dc;
      --accent:#ffe66a; /* yellow outline */
      --best:#b20000;   /* best-hand outline */
      --wild:#ffff88;   /* wild highlight fill */
      --shadow:0 10px 30px rgba(0,0,0,.35);

      /* NEW: player boxes wider than community */
      --playerW:460px;
      --commW:240px;

      --boxH:260px;

      --cardW:46px;
      --cardH:62px;
    }

    html,body{height:100%; margin:0; font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif; color:var(--text);}
    body{
      background: radial-gradient(1200px 700px at 50% 10%, #1aa06b55 0%, transparent 55%),
                  linear-gradient(145deg, var(--bg2) 0%, var(--bg1) 60%, #062a1d 100%);
      overflow-x:hidden;
    }

    /* Top bar */
    .topbar{
      position:sticky; top:0; z-index:20;
      display:grid;
      grid-template-columns: 1fr auto 1fr;
      align-items:center;
      gap:12px;
      padding:12px 14px;
      background: linear-gradient(180deg, rgba(0,0,0,.20), rgba(0,0,0,.05));
      backdrop-filter: blur(6px);
    }
    .topbar .left, .topbar .right{display:flex; align-items:center; gap:10px;}
    .topbar .left{justify-content:flex-start;}
    .topbar .center{justify-content:center; display:flex; align-items:center;}
    .topbar .right{justify-content:flex-end;}

    .title{
      font-weight:800;
      letter-spacing:.3px;
      font-size:20px;
      text-shadow: 0 2px 10px rgba(0,0,0,.25);
      user-select:none;
    }

    button, select{
      font:inherit;
      border-radius:12px;
      padding:8px 12px;
      border:1px solid rgba(255,255,255,.18);
      background: rgba(0,0,0,.22);
      color:var(--text);
      box-shadow: 0 4px 14px rgba(0,0,0,.25);
    }
    button:hover{filter:brightness(1.06);}
    button:active{transform: translateY(1px);}
    button:disabled{
      opacity:.45;
      cursor:not-allowed;
      filter:saturate(.8);
    }

    .wrap{
      padding:12px 14px 18px;
      display:flex;
      justify-content:center;
    }

    /* Command panel moved to upper-right */
    #commandPanel{
      position:fixed;
      right:14px;
      left:auto;
      top:64px;
      width: 420px;
      max-width: 420px;
      background: rgba(0,0,0,.55);
      border:1px solid rgba(255,255,255,.18);
      border-radius:14px;
      padding:10px 10px 12px;
      box-shadow: var(--shadow);
      z-index:30;
      display:none;
    }
    #commandText{
      white-space:pre-line;
      font-size:13px;
      color:var(--muted);
      margin-bottom:8px;
      line-height:1.25;
    }
    #commandChoices{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      align-items:center;
    }
    .miniBtn{
      padding:7px 10px;
      border-radius:10px;
      background: rgba(255,255,255,.12);
      border:1px solid rgba(255,255,255,.18);
      color:var(--text);
      cursor:pointer;
    }
    .pill{
      padding:8px 10px;
      border-radius:999px;
      background: rgba(255,255,255,.12);
      border:1px solid rgba(255,255,255,.18);
      cursor:pointer;
      user-select:none;
      font-size:13px;
    }

    /* Main board layout */
    .board{
      width: calc(var(--playerW) + var(--commW) + var(--playerW) + 28px);
      max-width: 1200px;
      display:grid;
      grid-template-columns: var(--playerW) var(--commW) var(--playerW);
      grid-template-rows: var(--boxH) var(--boxH) var(--boxH);
      gap:14px;
      align-items:stretch;
    }

    /* 2-player mode: single column, players full width, community narrower centered */
    body.mode2 .board{
      grid-template-columns: var(--playerW);
      grid-template-rows: var(--boxH) var(--boxH) var(--boxH);
      width: var(--playerW);
    }

    /* Player boxes */
    .player{
      width: var(--playerW);
      background: rgba(0,0,0,.18);
      border:1px solid rgba(255,255,255,.15);
      border-radius:18px;
      box-shadow: var(--shadow);
      padding:10px 10px 8px;
      overflow:hidden;
      position:relative;
      outline: 0 solid transparent;
      transition: outline-color .12s, outline-width .12s, box-shadow .12s;
    }
    .player.active{
      outline: 4px solid var(--accent);
    }
    .player.previewHover{
      outline: 5px solid var(--accent);
      box-shadow: 0 0 18px rgba(255,230,106,.25), var(--shadow);
    }

    .header{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:10px;
      font-weight:700;
      font-size:14px;
    }
    .rightInfo{
      text-align:right;
      font-weight:600;
    }
    .handLine{
      font-size:13px;
      font-weight:800;
    }
    .usingLine{
      margin-top:2px;
      font-size:11px;
      color:var(--muted);
      font-weight:600;
    }

    .sub{
      margin-top:4px;
      font-size:12px;
      color:var(--muted);
      opacity:.95;
      user-select:none;
    }

    .row{
      margin-top:10px;
      display:flex;
      gap:10px;
      align-items:flex-start;
    }
    .rowLabel{
      width:78px;
      font-size:12px;
      color:var(--muted);
      line-height:1.1;
      user-select:none;
    }
    .count{
      display:inline-block;
      margin-left:6px;
      opacity:.85;
      font-weight:700;
    }

    .cards{
      display:flex;
      flex-wrap:wrap;
      gap:8px;
      align-items:flex-start;
      max-height: 120px;
      overflow:hidden;
    }

    /* Cards */
    .card{
      width:var(--cardW);
      height:var(--cardH);
      background: var(--cardBg);
      border:1px solid var(--cardBorder);
      border-radius:10px;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:900;
      color:#111;
      box-shadow: 0 2px 8px rgba(0,0,0,.18);
      user-select:none;
      position:relative;
    }
    .card .suitRed{ color:#cc0000; }
    .card.clickable{ cursor:pointer; }
    .card.clickable:hover{ transform: translateY(-1px); }

    .card.wild{
      background: var(--wild);
    }
    .card.best{
      outline: 3px solid var(--best);
      outline-offset: -2px;
    }

    /* Community box narrower */
    .community{
      width: var(--commW);
      justify-self:center;
      background: rgba(0,0,0,.20);
      border:1px solid rgba(255,255,255,.15);
      border-radius:18px;
      box-shadow: var(--shadow);
      padding:10px;
      display:flex;
      flex-direction:column;
      gap:10px;
      overflow:hidden;
    }

    body.mode2 .community{
      justify-self:center;
    }

    .community h3{
      margin:0;
      font-size:13px;
      font-weight:900;
      letter-spacing:.2px;
    }
    .community .meta{
      font-size:11px;
      color:var(--muted);
      margin-top:-6px;
    }
    .community .cardsLine{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
    }

    #availableTrashLabel{
      margin-top:2px;
      font-size:12px;
      font-weight:900;
    }
    #choiceLabel{
      font-size:11px;
      color:var(--muted);
      margin-top:-6px;
    }

    .status{
      position:absolute;
      bottom:8px;
      left:10px;
      right:10px;
      font-size:12px;
      color:var(--muted);
      min-height: 16px;
    }

    /* Error box */
    #errorBox{
      display:none;
      margin:10px auto 0;
      max-width: 1100px;
      white-space: pre-wrap;
      background: rgba(80,0,0,.55);
      border:1px solid rgba(255,255,255,.18);
      border-radius:14px;
      padding:12px;
      box-shadow: var(--shadow);
    }

    /* Positioning grid */
    #p2{ grid-column:2; grid-row:1; justify-self:center; }
    #p1{ grid-column:1; grid-row:2; justify-self:end; }
    #communityBox{ grid-column:2; grid-row:2; }
    #p3{ grid-column:3; grid-row:2; justify-self:start; }
    #p4{ grid-column:2; grid-row:3; justify-self:center; }

    body.mode2 #p2{ grid-column:1; grid-row:1; justify-self:center; }
    body.mode2 #communityBox{ grid-column:1; grid-row:2; justify-self:center; }
    body.mode2 #p1{ grid-column:1; grid-row:3; justify-self:center; }

    @media (max-width: 980px){
      .board{
        width: 100%;
        grid-template-columns: 1fr;
        grid-template-rows: auto;
      }
      #p1,#p2,#p3,#p4,#communityBox{
        grid-column:1!important;
        grid-row:auto!important;
        justify-self:stretch!important;
      }
      .player,.community{ width:100%!important; height:auto; min-height: 220px; }
    }
  </style>
</head>
<body class="mode2">
  <div class="topbar">
    <div class="left">
      <button id="resetBtn">Reset</button>
      <select id="playerCount" title="Players">
        <option value="2" selected>2 Players</option>
        <option value="4">4 Players</option>
      </select>
    </div>

    <div class="center">
      <div class="title">Trash &amp; Treasure</div>
    </div>

    <div class="right">
      <button id="drawBtn">Draw</button>
      <button id="nextBtn">Next</button>
    </div>
  </div>

  <div id="errorBox"></div>

  <div id="commandPanel">
    <div id="commandText"></div>
    <div id="commandChoices"></div>
  </div>

  <div class="wrap">
    <div class="board">
      <div id="p2" class="player"></div>
      <div id="p1" class="player"></div>

      <div id="communityBox" class="community">
        <h3>Community <span class="meta">(counts for everyone)</span></h3>
        <div id="choiceLabel"></div>

        <div class="cardsLine" id="communityCards"></div>

        <div style="height:6px"></div>

        <div id="availableTrashLabel"></div>
        <div class="cardsLine" id="availableTrashCards"></div>
      </div>

      <div id="p3" class="player"></div>
      <div id="p4" class="player"></div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
